name: 'ecommerce_olist'
version: '1.0.0'
config-version: 2

profile: 'ecommerce_olist'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  ecommerce_olist:
    staging:
      +materialized: view
      +schema: staging
    marts:
      dimensions:
        +materialized: table
        +schema: marts
      facts:
        +materialized: table
        +schema: marts
      analytics:
        +materialized: table
        +schema: marts