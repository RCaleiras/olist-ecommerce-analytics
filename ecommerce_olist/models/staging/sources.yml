version: 2

sources:
  - name: raw
    schema: raw
    description: "Raw Olist tables loaded from Kaggle CSVs into PostgreSQL."

    tables:
      - name: orders
        description: "One row per order. Central table of the dataset."
        columns:
          - name: order_id
            tests: [not_null, unique]
          - name: customer_id
            tests: [not_null]
          - name: order_status
            tests:
              - not_null
              - accepted_values:
                  values: ['delivered','shipped','canceled','unavailable',
                           'invoiced','processing','created','approved']

      - name: order_items
        description: "One row per order item. Composite PK: order_id + order_item_id."
        columns:
          - name: order_id
            tests: [not_null]
          - name: order_item_id
            tests: [not_null]

      - name: payments
        description: "One row per payment. An order can have multiple payment rows."
        columns:
          - name: order_id
            tests: [not_null]

      - name: reviews
        description: "One row per review. review_id has known duplicates — deduplicated in staging."
        columns:
          - name: order_id
            tests: [not_null]

      - name: customers
        description: "One row per customer_id. customer_unique_id is the true customer identifier."
        columns:
          - name: customer_id
            tests: [not_null, unique]
          - name: customer_unique_id
            tests: [not_null]

      - name: sellers
        description: "One row per seller."
        columns:
          - name: seller_id
            tests: [not_null, unique]

      - name: products
        description: "One row per product. 610 products have no category (mapped to unknown)."
        columns:
          - name: product_id
            tests: [not_null, unique]

      - name: geolocation
        description: "Multiple coordinates per ZIP code prefix. Aggregated to median in staging."

      - name: translation
        description: "Portuguese to English product category name translation."
        columns:
          - name: product_category_name
            tests: [not_null]