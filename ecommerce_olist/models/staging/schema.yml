version: 2

models:
  - name: stg_orders
    description: "Cleaned and renamed orders. One row per order."
    columns:
      - name: order_id
        description: "Primary key."
        tests: [not_null, unique]
      - name: customer_id
        description: "Foreign key to stg_customers."
        tests: [not_null]
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['delivered','shipped','canceled','unavailable',
                       'invoiced','processing','created','approved']
      - name: purchased_at
        tests: [not_null]

  - name: stg_order_items
    description: "Cleaned order items. One row per item. Composite PK: order_id + order_item_id."
    columns:
      - name: order_id
        description: "Foreign key to stg_orders."
        tests: [not_null]
      - name: order_item_id
        description: "Sequential item number within the order."
        tests: [not_null]
      - name: product_id
        description: "Foreign key to stg_products."
        tests: [not_null]
      - name: seller_id
        description: "Foreign key to stg_sellers."
        tests: [not_null]
      - name: price
        tests: [not_null]
      - name: freight_value
        tests: [not_null]

  - name: stg_payments
    description: "Cleaned payments. One row per payment line. An order can have multiple rows (e.g. credit card + voucher)."
    columns:
      - name: order_id
        description: "Foreign key to stg_orders."
        tests: [not_null]
      - name: payment_sequential
        description: "Payment sequence number within the order."
        tests: [not_null]
      - name: payment_type
        tests:
          - not_null
          - accepted_values:
              values: ['credit_card','boleto','voucher','debit_card','not_defined']
      - name: payment_value
        tests: [not_null]

  - name: stg_reviews
    description: "Cleaned and deduplicated reviews. One row per review_id. 814 duplicates removed, keeping most recent."
    columns:
      - name: review_id
        description: "Primary key (post-deduplication)."
        tests: [not_null, unique]
      - name: order_id
        description: "Foreign key to stg_orders."
        tests: [not_null]
      - name: review_score
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]

  - name: stg_customers
    description: "Cleaned customers. One row per customer_id. Note: customer_unique_id is the true customer identifier — one customer can have multiple customer_ids across orders."
    columns:
      - name: customer_id
        description: "Primary key. Order-scoped identifier."
        tests: [not_null, unique]
      - name: customer_unique_id
        description: "True customer identifier. Use this for RFM, cohorts and retention analysis."
        tests: [not_null]
      - name: customer_zip_code_prefix
        tests: [not_null]
      - name: customer_state
        tests: [not_null]

  - name: stg_sellers
    description: "Cleaned sellers. One row per seller."
    columns:
      - name: seller_id
        description: "Primary key."
        tests: [not_null, unique]
      - name: seller_zip_code_prefix
        tests: [not_null]
      - name: seller_state
        tests: [not_null]

  - name: stg_products
    description: "Cleaned products with English category names. 610 products with no category mapped to 'unknown'. 2 categories missing from translation table handled with CASE WHEN."
    columns:
      - name: product_id
        description: "Primary key."
        tests: [not_null, unique]
      - name: product_category_name
        description: "Original Portuguese category name. Null values mapped to 'unknown'."
        tests: [not_null]
      - name: product_category_name_en
        description: "English category name. Source: translation table + manual mapping for pc_gamer and portateis_cozinha_e_preparadores_de_alimentos."
        tests: [not_null]

  - name: stg_geolocation
    description: "Geolocation aggregated to one row per ZIP code prefix. Median lat/lng. 261,831 duplicate rows and 42 out-of-Brazil coordinates removed."
    columns:
      - name: zip_code_prefix
        description: "Primary key. 5-digit Brazilian ZIP code prefix."
        tests: [not_null, unique]
      - name: lat
        description: "Median latitude for this ZIP code prefix."
        tests: [not_null]
      - name: lng
        description: "Median longitude for this ZIP code prefix."
        tests: [not_null]