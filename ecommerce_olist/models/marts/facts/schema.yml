version: 2

models:
  - name: fct_orders
    description: "One row per order. Central fact table. Contains value, delivery and status metrics."
    columns:
      - name: order_id
        description: "Primary key."
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]
      - name: customer_unique_id
        tests: [not_null]
      - name: order_status
        tests: [not_null]
      - name: purchased_at
        tests: [not_null]
      - name: order_value
        tests: [not_null]
      - name: item_count
        tests: [not_null]

  - name: fct_order_items
    description: "One row per order item. Contains price, freight and freight_ratio."
    columns:
      - name: order_id
        tests: [not_null]
      - name: order_item_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: seller_id
        tests: [not_null]
      - name: price
        tests: [not_null]
      - name: freight_value
        tests: [not_null]

  - name: fct_payments
    description: "One row per payment line. An order can have multiple rows."
    columns:
      - name: order_id
        tests: [not_null]
      - name: payment_sequential
        tests: [not_null]
      - name: payment_type
        tests: [not_null]
      - name: payment_value
        tests: [not_null]

  - name: fct_reviews
    description: "One row per review (post-deduplication in staging)."
    columns:
      - name: review_id
        description: "Primary key."
        tests: [not_null, unique]
      - name: order_id
        tests: [not_null]
      - name: review_score
        tests: [not_null]